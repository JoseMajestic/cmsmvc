<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Boletín · WebDesigno</title>
  <link rel="apple-touch-icon" sizes="180x180" href="../assets/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../assets/favicon/favicon-16x16.png">
  <link rel="manifest" href="../assets/favicon/site.webmanifest">
  <link rel="icon" href="../assets/favicon/favicon.ico">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="boletin-fondo">
  <header class="topBar">
    <div class="marca-simple">
      <img class="logo-chico" src="../assets/branding.png" alt="WebDesigno" width="52" height="52" decoding="async" />
      <div>
        <p>WebDesigno</p>
        <p class="marca-rol">Studio</p>
      </div>
    </div>
    <nav class="menu-simple" aria-label="Navegación principal">
      <a href="../index.php">Home</a>
      <a href="about.html">About</a>
      <a href="services.html">Services</a>
      <a href="contact.html">Contact</a>
      <a href="presupuesto.html">Presupuesto</a>
    </nav>
  </header>

  <div class="lienzo boletin-lienzo">
    <main class="boletin-main">
      <section class="boletin-hero" id="boletin-hero">
        <h1>Vas a perdérteo?</h1>
        <img class="boletin-chevron" src="../assets/chevron-down.svg" alt="" width="44" height="44" decoding="async" />
        <button type="button" class="boletin-cta" id="boletin-open">Acceder al formulario</button>
      </section>

      <section class="boletin-form-wrapper" id="boletin-form" hidden>
        <div class="boletin-card" role="dialog" aria-modal="true" aria-labelledby="boletin-titulo">
          <button type="button" class="boletin-close" id="boletin-close" aria-label="Cerrar">×</button>

          <div class="boletin-card-left">
            <h2 id="boletin-titulo">Regístrate</h2>

            <form class="boletin-form" action="#" method="post" autocomplete="on" novalidate>
              <label for="boletin-nombre">Nombre</label>
              <input id="boletin-nombre" name="nombre" type="text" placeholder="Tu nombre" autocomplete="given-name">

              <label for="boletin-email">E-mail</label>
              <input id="boletin-email" name="email" type="email" placeholder="tu@email.com" autocomplete="email">

              <div class="boletin-toggle">
                <p>¿Quieres suscribir a nuestro boletín?</p>
                <div class="boletin-toggle-row">
                  <span class="boletin-toggle-label">No</span>
                  <label class="boletin-switch">
                    <input id="boletin-subscribe" name="subscribe" type="checkbox" aria-label="Suscripción">
                    <span class="boletin-slider" aria-hidden="true"></span>
                  </label>
                  <span class="boletin-toggle-label">Sí</span>
                </div>
              </div>

              <button type="submit" class="boletin-submit">Enviar</button>
            </form>
          </div>

          <div class="boletin-card-right" aria-hidden="true"></div>
        </div>
      </section>
    </main>

  </div>
  <footer>
    <nav aria-label="Navegación secundaria">
      <ul>
        <li><a href="../index.php">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="presupuesto.html">Presupuesto</a></li>
      </ul>
    </nav>
    <img src="../assets/branding.png" alt="WebDesigno" width="44" height="44" loading="lazy" decoding="async" />
  </footer>

  <script src="../js/boletin.js" defer></script>
</body>
</html>
